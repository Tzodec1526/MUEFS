server {
    listen 3000 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip on by default in the base image; mirror it here for prebuilt assets.
    gzip on;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;
    gzip_min_length 1024;

    # Hash-named build assets are immutable; cache them aggressively.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The HTML shell must never be cached so deploys propagate immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Defense-in-depth headers for the static portal.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # SPA history fallback — every unknown path serves the React shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health endpoint for orchestrators that hit the static container directly.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
